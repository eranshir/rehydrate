# rehydrate categories taxonomy
#
# Each category describes what to capture and how. Strategy types:
#   file-list      — match files by glob, capture each as bytes (e.g. dotfiles, ssh-keys)
#   package-list   — capture installed-package inventory (e.g. Brewfile, pip freeze)
#   app-list       — capture installed-app inventory by name (e.g. /Applications/*.app → cask match)
#   repo-list      — capture git remotes; restore clones from remote (e.g. dev-projects)
#   full-snapshot  — capture everything in a directory recursively (e.g. local-only-projects)
#
# Globs use ~ for $HOME and standard shell glob syntax with ** for recursive.
# `iCloud_managed: true` means iCloud already syncs this content — skip by default.
#
# SECURITY NOTICE: ssh-keys, gnupg, and browser-profiles contain secrets (private keys,
# keyrings, saved passwords/cookies) and are stored PLAINTEXT on the backup drive per
# ADR-001 §5. Ensure the backup drive is physically secure or encrypted at the device
# level (e.g., FileVault on an external drive). Encrypted-at-rest secrets are planned
# for v0.2.

schema_version: "0.1.0"

categories:
  - name: dotfiles
    enabled: true
    strategy: file-list
    description: Shell rc files, git config, tmux config — the bedrock of a developer's environment
    globs:
      - ~/.bashrc
      - ~/.bash_profile
      - ~/.zshrc
      - ~/.zshenv
      - ~/.zprofile
      - ~/.profile
      - ~/.gitconfig
      - ~/.tmux.conf
      - ~/.inputrc
      - ~/.editorconfig
      - ~/.config/git/**
      - ~/.config/zsh/**
      - ~/.config/nvim/**
    exclude:
      - "**/.DS_Store"
    iCloud_managed: false

  # Phase 3.1: file-list categories — enabled in issue #15.
  - name: ssh-keys
    enabled: true
    strategy: file-list
    description: SSH private keys, known_hosts, authorized_keys
    globs:
      - ~/.ssh/**
    exclude:
      - "**/socket"
      - "**/control-socket-*"
      - "**/agent.*"
      - "**/*.sock"
      - "**/.DS_Store"
    iCloud_managed: false

  - name: gnupg
    enabled: true
    strategy: file-list
    description: GnuPG configuration and keys
    globs:
      - ~/.gnupg/**
    exclude:
      - "**/S.gpg-agent*"
      - "**/random_seed"
      - "**/.gpg-v21-migrated"
      - "**/.DS_Store"
    iCloud_managed: false

  - name: launchagents
    enabled: true
    strategy: file-list
    description: User-level launchd agents
    globs:
      - ~/Library/LaunchAgents/*.plist
    iCloud_managed: false

  - name: defaults
    enabled: true
    strategy: file-list
    description: macOS user-domain preferences (Dock, Finder, NSGlobalDomain, etc.) captured directly from ~/Library/Preferences/ plist files. Restoring may require `killall cfprefsd` for the macOS preferences daemon to pick up changes.
    globs:
      - ~/Library/Preferences/.GlobalPreferences.plist
      - ~/Library/Preferences/com.apple.dock.plist
      - ~/Library/Preferences/com.apple.finder.plist
      - ~/Library/Preferences/com.apple.menuextra.clock.plist
      - ~/Library/Preferences/com.apple.systempreferences.plist
      - ~/Library/Preferences/com.apple.symbolichotkeys.plist
      - ~/Library/Preferences/com.apple.Terminal.plist
      - ~/Library/Preferences/com.googlecode.iterm2.plist
    exclude:
      - "**/.DS_Store"
    iCloud_managed: false

  - name: browser-profiles
    enabled: true
    strategy: file-list
    description: Chrome/Firefox/Brave/Edge user profiles (NOT Safari — iCloud handles that)
    globs:
      - ~/Library/Application Support/Google/Chrome/**
      - ~/Library/Application Support/Firefox/**
      - ~/Library/Application Support/BraveSoftware/**
      - ~/Library/Application Support/Microsoft Edge/**
    exclude:
      - "**/Cache/**"
      - "**/Code Cache/**"
      - "**/GPUCache/**"
      - "**/Service Worker/CacheStorage/**"
      - "**/Service Worker/ScriptCache/**"
      - "**/blob_storage/**"
      - "**/Network/Cache/**"
      - "**/File System/**"
      - "**/Crashpad/**"
      - "**/component_crx_cache/**"
      - "**/optimization_guide_model_store/**"
      - "**/Worker/CacheStorage/**"
      - "**/Worker/ScriptCache/**"
      - "**/.DS_Store"
    iCloud_managed: false

  - name: app-sessions
    enabled: true
    strategy: file-list
    description: Claude/Codex/Gemini/Cursor/VS Code sessions and settings
    globs:
      - ~/.claude/**
      - ~/.codex/**
      - ~/.gemini/**
      - ~/Library/Application Support/Cursor/**
      - ~/Library/Application Support/Code/User/settings.json
      - ~/Library/Application Support/Code/User/keybindings.json
    exclude:
      - "**/cache/**"
      - "**/tmp/**"
      - "**/Code Cache/**"
      - "**/IndexedDB/**"
      - "**/.DS_Store"
    iCloud_managed: false

  - name: package-managers
    enabled: true
    strategy: package-list
    description: Homebrew, npm globals, pip, cargo, go install, gem
    managers:
      - brew
      - npm
      - pip
      - cargo
      - go
      - gem
    iCloud_managed: false

  - name: app-inventory
    enabled: true
    strategy: app-list
    description: Installed apps in /Applications and ~/Applications, resolved to cask names where possible
    iCloud_managed: false

  - name: dev-projects
    enabled: true
    strategy: repo-list
    description: Git repos with remotes — capture remote URLs + gitignored secrets, clone on restore
    roots:
      - ~/Documents/Projects
      - ~/Projects
      - ~/src
    iCloud_managed: false

  - name: local-only-projects
    enabled: true
    strategy: full-snapshot
    description: Project directories that have no git remote — capture full contents (minus venvs/node_modules)
    roots:
      - ~/Documents/Projects
    exclude:
      - "**/node_modules/**"
      - "**/.venv/**"
      - "**/venv/**"
      - "**/__pycache__/**"
      - "**/.next/**"
      - "**/dist/**"
      - "**/build/**"
    iCloud_managed: false

  - name: custom-content
    enabled: true
    strategy: file-list
    description: User-classified folders that aren't covered by other categories (Music libraries, photo collections not in iCloud, etc.)
    # globs are intentionally empty here. The backup SKILL.md prompts the user for
    # paths at backup time and passes them as --globs overrides to walk.py.
    globs: []
    iCloud_managed: false

# Categories iCloud already syncs — skip by default in any backup.
# These are documentation; rehydrate does not attempt to back them up.
iCloud_trusted_skip:
  - name: Mail
    reason: iCloud Mail sync
  - name: Notes
    reason: iCloud Notes sync
  - name: Photos
    reason: iCloud Photos sync
  - name: Safari
    reason: iCloud Safari sync (history, bookmarks, tabs)
  - name: Keychain
    reason: iCloud Keychain sync
  - name: Contacts
    reason: iCloud Contacts sync
  - name: Calendar
    reason: iCloud Calendar sync
  - name: Reminders
    reason: iCloud Reminders sync
  - name: Voice Memos
    reason: iCloud Voice Memos sync
  - name: Messages
    reason: Messages in iCloud
  - name: AppStore
    reason: App Store apps re-download on restore from Apple ID
